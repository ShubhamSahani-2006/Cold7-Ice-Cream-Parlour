<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="Ice_cream_CSS1.css">
</head>
<body id="body1">
    

<div class="container">

    <!-- LEFT: FORM -->
    <div id="form">
        <div id="loginForm">Create Account</div>

        <input type="text" id="userName" placeholder="Enter your name">

        <input type="password" id="createPassword" placeholder="Create password">

        <input type="password" id="confirmPassword" placeholder="Confirm password">

        <button id="loginButton" onclick="location.href='Ice_cream_HTML2.html'">
            Continue →
        </button>
    </div>

    <!-- RIGHT: IMAGE -->
    <div id="iceCreamBackground"></div>

</div>

<script src="Ice_cream_Javascript.js"></script>
</body>
</html>
